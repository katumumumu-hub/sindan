<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>【究極】調味料性格診断</title>
    <style>
        :root {
            --primary-bg: #fdfaf5;
            --card-bg: #ffffff;
            --accent-main: #c0392b; 
            --accent-sub: #16a085;
            --text-main: #2c3e50;
            --text-muted: #95a5a6;
            --line-color: #06C755;
            --x-color: #000000;
            --copy-color: #7f8c8d;
            --border-radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--primary-bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; overflow: hidden; }

        #app-container {
            width: 94%; max-width: 400px; background: var(--card-bg); padding: 15px; border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; position: relative; z-index: 1;
        }

        /* 質問・進捗 */
        #progress-bar { position: fixed; top: 0; left: 0; height: 4px; background: var(--accent-main); width: 0%; z-index: 1000; transition: width 0.3s; }
        .question-text { font-size: 1.1rem; margin: 15px 0; min-height: 3.5rem; display: flex; align-items: center; justify-content: center; font-weight: bold; line-height: 1.4; }
        .option-btn { background: #fff; border: 2px solid #edf2f7; padding: 12px; border-radius: 10px; margin-bottom: 8px; width: 100%; text-align: left; cursor: pointer; font-size: 0.9rem; }

        /* 結果画面（1画面集約） */
        .result-title { font-size: 1.4rem; color: var(--accent-main); margin: 5px 0; font-weight: 800; }
        
        #chart-outer { width: 100%; max-width: 220px; margin: 0 auto; position: relative; }
        #chartCanvas { width: 100% !important; height: auto !important; display: block; }

        .result-desc { font-size: 0.8rem; text-align: left; padding: 10px; background: #fef5f4; border-radius: 8px; margin: 8px 0; line-height: 1.4; border-left: 4px solid var(--accent-main); }

        .compatibility-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .comp-box { padding: 6px; border-radius: 6px; border: 1px solid #eee; }
        .comp-good { background-color: #e6fffa; color: #00684a; }
        .comp-bad { background-color: #fff5f5; color: #9b2c2c; }
        .comp-label { font-size: 0.6rem; font-weight: bold; display: block; }
        .comp-type { font-size: 0.8rem; font-weight: 700; }

        /* ボタン群 */
        .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
        .btn-share { padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 0.75rem; cursor: pointer; z-index: 10; }
        .btn-x { background: var(--x-color); }
        .btn-line { background: var(--line-color); }
        .btn-copy { background: var(--copy-color); grid-column: span 2; }
        .btn-restart { background: none; border: none; color: var(--text-muted); font-size: 0.7rem; text-decoration: underline; cursor: pointer; margin-top: 5px; }

        .hidden { display: none !important; }
        .loading-icon { font-size: 2rem; animation: rotate 2s linear infinite; display: inline-block; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="progress-bar"></div>
    <div id="app-container">
        <div id="splash">
            <div style="font-size: 3rem; margin-bottom: 10px;">🧂</div>
            <h1 style="font-size: 1.4rem; color: var(--accent-main); margin-bottom: 10px;">調味料性格診断</h1>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">あなたの性格と相性を1画面で分析。</p>
            <button class="option-btn" style="text-align:center; background: var(--accent-main); color:white; border:none; font-weight:bold;" onclick="start()">診断をはじめる</button>
        </div>

        <div id="question-screen" class="hidden">
            <p id="q-num" style="font-size:0.7rem; color:var(--accent-sub); font-weight:bold;"></p>
            <p class="question-text" id="q-text"></p>
            <div id="options"></div>
        </div>

        <div id="loading" class="hidden">
            <div class="loading-icon">🍳</div>
            <p style="font-size: 0.9rem; margin-top: 10px;">あなたの成分を抽出中...</p>
        </div>
      
        <div id="result-screen" class="hidden">
            <p class="result-title" id="res-title"></p>
            <div id="chart-outer"><canvas id="chartCanvas"></canvas></div>
            <div class="result-desc" id="res-desc"></div>
            <div class="compatibility-container">
                <div class="comp-box comp-good"><span class="comp-label">GOOD 相性</span><span class="comp-type" id="comp-good"></span></div>
                <div class="comp-box comp-bad"><span class="comp-label">BAD 相性</span><span class="comp-type" id="comp-bad"></span></div>
            </div>
            <div class="share-grid">
                <button class="btn-share btn-x" onclick="shareX()">Xでシェア</button>
                <button class="btn-share btn-line" onclick="shareLine()">LINE</button>
                <button class="btn-share btn-copy" id="btn-copy" onclick="copyResult()">結果をコピー</button>
            </div>
            <button class="btn-restart" onclick="location.reload()">もう一度診断する</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "休日の過ごし方は？", a: "計画を立てて動く", b: "その時の気分で動く", c: "家で趣味に没頭" },
            { q: "初対面の人と話す時は？", a: "自分から話題を振る", b: "聞き役に回る", c: "様子を見て話す" },
            { q: "仕事への取り組み方は？", a: "スピード重視", b: "丁寧にミスなく", c: "独自のこだわり" },
            { q: "友達が落ち込んでいたら？", a: "遊びに誘う", b: "話をじっくり聞く", c: "論理的に考える" },
            { q: "机の上はどんな状態？", a: "整理整頓されている", b: "適度に散らかっている", c: "自分なりの配置" },
            { q: "お店で注文するなら？", a: "人気1位を選ぶ", b: "直感で選ぶ", c: "珍しいものを選ぶ" },
            { q: "サプライズを仕掛けるのは？", a: "大好き！", b: "やるのは苦手", c: "不要。平穏が一番" },
            { q: "トラブルが起きたら？", a: "指示を出して解決", b: "周囲を落ち着かせる", c: "一人で黙々と解決" },
            { q: "自分の性格は？", a: "真っ直ぐで嘘なし", b: "柔軟で馴染みやすい", c: "個性的で頑固" },
            { q: "相談を受けるなら？", a: "励ましを求められる", b: "安心を求められる", c: "意見を求められる" },
            { q: "飲み会は好き？", a: "賑やかなのが好き", b: "少人数が良い", c: "誘われれば行く" },
            { q: "SNS投稿スタイルは？", a: "頻繁に更新", b: "たまに厳選して", c: "見る専門" },
            { q: "約束の時間には？", a: "5分前に到着", b: "ぴったりに到着", c: "少し早めに付近にいる" },
            { q: "欲しいものを見つけたら？", a: "その場で即決", b: "一晩考えてから", c: "徹底的に調べる" },
            { q: "映画を観るなら？", a: "スカッとアクション", b: "心温まるドラマ", c: "考察系ミステリー" },
            { q: "自分の長所は？", a: "行動力", b: "協調性", c: "探究心" },
            { q: "怒った時はどうなる？", a: "はっきり口に出す", b: "黙って距離を置く", c: "理詰めで話す" },
            { q: "理想のリーダーは？", a: "力強く引っ張る", b: "皆をまとめる", c: "背中で語る" },
            { q: "今の生活に満足？", a: "刺激が欲しい", b: "穏やかにいたい", c: "変革を起こしたい" },
            { q: "「主役」になりたい？", a: "主役がいい", b: "支える側がいい", c: "自由でいたい" }
        ];

        const results = [
            { t: "王道の「しお」", d: "素材を引き出す天才。あなたがいなければ物事が成立しない不可欠な存在です。", p: [80, 20, 10, 30, 20], g: "黄金のごま油", b: "刺激的な唐辛子" },
            { t: "包容力の「お砂糖」", d: "周囲を癒やすムードメーカー。トゲトゲした空気もあなたがいれば丸く収まります。", p: [20, 80, 10, 90, 30], g: "深みのあるお味噌", b: "魅惑のスパイス" },
            { t: "刺激的な「唐辛子」", d: "退屈に火をつける情熱家。あなたの言葉は時に誰かの目を覚まさせます。", p: [100, 10, 20, 10, 40], g: "ギャップのマヨネーズ", b: "王道のしお" },
            { t: "深みのある「お味噌」", d: "一緒にいると安心する存在。時間をかけて信頼を築く温かい人情派です。", p: [10, 90, 20, 80, 40], g: "包容力のお砂糖", b: "洗練された酢" },
            { t: "ギャップのマヨネーズ", d: "驚異の適応力。マイルドに見えて、実は誰にも譲れない強い芯を持っています。", p: [50, 50, 30, 60, 40], g: "刺激的な唐辛子", b: "孤高のトリュフ塩" },
            { t: "洗練された「酢」", d: "センスが光る知性派。酸いも甘いも噛み分けた、大人の余裕があります。", p: [10, 30, 80, 20, 90], g: "孤高のトリュフ塩", b: "深みのあるお味噌" },
            { t: "魅惑の「スパイス」", d: "一筋縄ではいかないミステリアスな人。独特な魅力で周囲を虜にします。", p: [40, 10, 90, 20, 70], g: "万能のめんつゆ", b: "包容力のお砂糖" },
            { t: "黄金の「ごま油」", d: "いるだけで場が華やぐ香りの魔術師。全体の質をワンランクアップさせます。", p: [70, 40, 20, 50, 30], g: "王道のしお", b: "万能のめんつゆ" },
            { t: "万能の「めんつゆ」", d: "何でも器用にこなすマルチタレント。効率よく完璧に物事を進める賢者です。", p: [40, 60, 30, 50, 70], g: "魅惑のスパイス", b: "黄金のごま油" },
            { t: "孤高の「トリュフ塩」", d: "希少な感性の持ち主。特別な場面でこそ輝くカリスマ性を秘めています。", p: [10, 10, 100, 20, 90], g: "洗練された酢", b: "ギャップのマヨネーズ" }
        ];

        let step = 0;
        let score = { A: 0, B: 0, C: 0 };
        let finalResult = null;

        function start() {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            render();
        }

        function render() {
            if (step < questions.length) {
                const q = questions[step];
                document.getElementById('q-num').textContent = `Q ${step + 1} / ${questions.length}`;
                document.getElementById('q-text').textContent = q.q;
                const optHtml = `
                    <button class="option-btn" onclick="next('A')">A. ${q.a}</button>
                    <button class="option-btn" onclick="next('B')">B. ${q.b}</button>
                    <button class="option-btn" onclick="next('C')">C. ${q.c}</button>
                `;
                document.getElementById('options').innerHTML = optHtml;
                document.getElementById('progress-bar').style.width = `${(step / questions.length) * 100}%`;
            } else {
                showLoading();
            }
        }

        function next(ans) {
            score[ans]++;
            step++;
            render();
        }

        function showLoading() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '100%';
            setTimeout(showResult, 1200);
        }

        function showResult() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const totalA = score.A, totalB = score.B, totalC = score.C;
            // 簡易的なロジックで判定
            let idx = 0;
            if (totalA > 10) idx = 2; // 唐辛子
            else if (totalB > 10) idx = 3; // 味噌
            else if (totalC > 10) idx = 9; // トリュフ
            else if (totalA > 7 && totalB > 7) idx = 4; // マヨ
            else idx = Math.floor(Math.random() * results.length);

            finalResult = results[idx];
            document.getElementById('res-title').textContent = finalResult.t;
            document.getElementById('res-desc').textContent = finalResult.d;
            document.getElementById('comp-good').textContent = finalResult.g;
            document.getElementById('comp-bad').textContent = finalResult.b;

            drawChart(finalResult.p);
        }

        function drawChart(data) {
            const canvas = document.getElementById('chartCanvas');
            const ctx = canvas.getContext('2d');
            const size = 220;
            canvas.width = size * 2;
            canvas.height = size * 2;
            ctx.scale(2, 2);

            const cx = size / 2, cy = size / 2, r = 70;
            const labels = ["情熱", "癒やし", "個性", "安定", "知性"];

            // グリッド
            ctx.strokeStyle = "#eee";
            for(let i=1; i<=5; i++) {
                ctx.beginPath();
                const curR = r * (i/5);
                for(let j=0; j<5; j++) {
                    const ang = (Math.PI*2/5)*j - (Math.PI/2);
                    const x = cx + Math.cos(ang)*curR, y = cy + Math.sin(ang)*curR;
                    if(j===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath(); ctx.stroke();
            }

            // データ描画
            ctx.beginPath();
            data.forEach((val, i) => {
                const ang = (Math.PI*2/5)*i - (Math.PI/2);
                const curR = r * (val/100);
                const x = cx + Math.cos(ang)*curR, y = cy + Math.sin(ang)*curR;
                if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fillStyle = "rgba(192, 57, 43, 0.5)"; ctx.fill();
            ctx.strokeStyle = "#c0392b"; ctx.lineWidth = 3; ctx.stroke();

            // ラベル
            ctx.fillStyle = "#2c3e50"; ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center";
            labels.forEach((l, i) => {
                const ang = (Math.PI*2/5)*i - (Math.PI/2);
                const x = cx + Math.cos(ang)*(r+15), y = cy + Math.sin(ang)*(r+15);
                ctx.fillText(l, x, y+4);
            });
        }

        function shareX() {
            const text = `【調味料診断】私のタイプは「${finalResult.t}」でした！\n🤝相性良：${finalResult.g}\n#調味料性格診断`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(location.href)}`);
        }
        function shareLine() {
            const text = `【調味料診断】私のタイプは「${finalResult.t}」！ 相性最高は${finalResult.g}。 ${location.href}`;
            location.href = `line://msg/text/${encodeURIComponent(text)}`;
        }
        function copyResult() {
            const text = `【調味料性格診断】結果：${finalResult.t}\n${finalResult.d}\n相性良：${finalResult.g} / 相性悪：${finalResult.b}`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('btn-copy');
                btn.textContent = "コピー完了！";
                setTimeout(() => btn.textContent = "結果をコピー", 2000);
            });
        }
    </script>
</body>
</html>
