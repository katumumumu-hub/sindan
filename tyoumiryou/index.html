<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>【究極】調味料性格診断</title>
    <style>
        :root {
            --primary-bg: #fdfaf5;
            --card-bg: #ffffff;
            --accent-main: #c0392b; 
            --accent-sub: #16a085;
            --text-main: #2c3e50;
            --text-muted: #95a5a6;
            --line-color: #06C755;
            --x-color: #000000;
            --copy-color: #7f8c8d;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            width: 100vw;
        }

        #app-container {
            width: 94%;
            max-width: 420px;
            background: var(--card-bg);
            padding: 20px 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }

        /* 質問画面の調整 */
        .question-text { font-size: 1.1rem; margin-bottom: 20px; min-height: 4rem; display: flex; align-items: center; justify-content: center; line-height: 1.4; font-weight: 700; }
        .option-btn {
            background: #fff; border: 2px solid #edf2f7; padding: 14px 15px;
            color: var(--text-main); border-radius: 10px; text-align: left;
            font-size: 0.9rem; cursor: pointer; font-weight: 500; margin-bottom: 10px; width: 100%;
        }

        /* プログレスバー */
        #progress-bar { position: fixed; top: 0; left: 0; height: 4px; background: var(--accent-main); width: 0%; z-index: 1000; }

        /* 結果画面の1画面集約調整 */
        .result-intro { font-size: 0.8rem; color: var(--text-muted); }
        .result-title { font-size: 1.5rem; color: var(--accent-main); margin: 5px 0 10px; font-weight: 800; }
        
        #chart-container {
            width: 100%;
            max-width: 240px; /* 少し小さくしてスペース確保 */
            aspect-ratio: 1;
            margin: 0 auto 10px;
        }

        .result-desc { font-size: 0.85rem; text-align: left; padding: 12px; background: #fef5f4; border-radius: 10px; margin-bottom: 12px; line-height: 1.5; border-left: 4px solid var(--accent-main); }

        .compatibility-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .comp-box { padding: 8px; border-radius: 8px; }
        .comp-good { background-color: #e6fffa; border: 1px solid #b2f5ea; color: #00684a; }
        .comp-bad { background-color: #fff5f5; border: 1px solid #feb2b2; color: #9b2c2c; }
        .comp-label { font-size: 0.65rem; font-weight: bold; margin-bottom: 2px; display: block; }
        .comp-type { font-size: 0.85rem; font-weight: 700; }

        .btn-action {
            background: var(--accent-main); color: white; padding: 12px;
            border: none; border-radius: 25px; font-weight: 700; font-size: 1rem; width: 100%;
        }

        .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .btn-share {
            padding: 10px; border: none; border-radius: 8px; color: white;
            font-weight: 700; font-size: 0.8rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-x { background-color: var(--x-color); }
        .btn-line { background-color: var(--line-color); }
        .btn-copy { background-color: var(--copy-color); grid-column: span 2; }

        .hidden { display: none !important; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-icon { font-size: 2.5rem; animation: rotate 2s linear infinite; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="progress-bar"></div>
    <div id="app-container">
        <div id="splash">
            <span style="font-size: 3rem; display: block; margin-bottom: 10px;">🧂</span>
            <h1>調味料性格診断</h1>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px;">あなたの性格と相性を分析します。</p>
            <button class="btn-action" onclick="start()">診断をはじめる</button>
        </div>

        <div id="question-screen" class="hidden">
            <p id="q-num" style="font-size: 0.75rem; color: var(--accent-sub); font-weight: bold; margin-bottom: 8px;"></p>
            <p class="question-text" id="q-text"></p>
            <div class="options-container">
                <button class="option-btn" onclick="next('A')"><span id="optA"></span></button>
                <button class="option-btn" onclick="next('B')"><span id="optB"></span></button>
                <button class="option-btn" onclick="next('C')"><span id="optC"></span></button>
            </div>
        </div>

        <div id="loading" class="hidden">
            <div class="loading-icon">🍳</div>
            <p>分析中...</p>
        </div>
      
        <div id="result-screen" class="hidden">
            <p class="result-intro">診断結果</p>
            <p class="result-title" id="res-title"></p>
            
            <div id="chart-container">
                <canvas id="chartCanvas"></canvas>
            </div>

            <div class="result-desc" id="res-desc"></div>

            <div class="compatibility-container">
                <div class="comp-box comp-good">
                    <span class="comp-label">GOOD 相性</span>
                    <span class="comp-type" id="comp-good-type"></span>
                </div>
                <div class="comp-box comp-bad">
                    <span class="comp-label">BAD 相性</span>
                    <span class="comp-type" id="comp-bad-type"></span>
                </div>
            </div>

            <div class="share-grid">
                <button class="btn-share btn-x" id="btn-x">Xでシェア</button>
                <button class="btn-share btn-line" id="btn-line">LINE</button>
                <button class="btn-share btn-copy" id="btn-copy">結果をコピー</button>
            </div>

            <p style="font-size: 0.7rem; color: var(--text-muted); cursor: pointer;" onclick="location.reload()">もう一度診断する</p>
        </div>
    </div>

    <script>
        const questions = [
            { q: "休日の過ごし方は？", a: "計画を立ててアクティブに", b: "その時の気分でぶらぶら", c: "家で静かに趣味に没頭" },
            { q: "初対面の人と話すときは？", a: "自分から積極的に話題を振る", b: "聞き役に回る", c: "共通の話題を探して様子見" },
            { q: "仕事への取り組み方は？", a: "スピード重視で片付ける", b: "丁寧にミスなく進める", c: "独自のこだわりを詰め込む" },
            { q: "友達が落ち込んでいたら？", a: "遊びに誘って元気づける", b: "隣で話をじっくり聞く", c: "解決策を論理的に考える" },
            { q: "机の上はどんな状態？", a: "整理整頓されている", b: "適度に散らかっている", c: "独特な配置がある" },
            { q: "新しいお店に入ったら？", a: "人気1位を注文する", b: "直感で選ぶ", c: "珍しいものに挑戦する" },
            { q: "サプライズを仕掛けるのは？", a: "大好き！", b: "やるのは苦手", c: "不要。平穏が一番" },
            { q: "トラブルが起きたら？", a: "状況整理して指示を出す", b: "周囲をなだめる", c: "一人で黙々と解決する" },
            { q: "自分の性格は？", a: "真っ直ぐで嘘がつけない", b: "柔軟で馴染みやすい", c: "個性的でこだわりが強い" },
            { q: "人から相談を受ける？", a: "背中を押してほしい時", b: "癒やしを求められる時", c: "専門意見を求められる時" },
            { q: "大勢での飲み会は？", a: "賑やかなのが好き", b: "少人数がいい", c: "誘われれば行く" },
            { q: "SNSへの投稿は？", a: "頻繁にアップする", b: "たまに綺麗な写真だけ", c: "見る専門" },
            { q: "約束の時間に対しては？", a: "5分前には到着", b: "ぴったり、少し遅れる", c: "別の場所で時間を潰す" },
            { q: "欲しいものを見つけたら？", a: "すぐ買ってしまう", b: "一晩寝て考える", c: "口コミを徹底調査" },
            { q: "映画を観るなら？", a: "アクションやコメディ", b: "ヒューマンドラマ", c: "ミステリーやSF" },
            { q: "自分の長所は？", a: "行動力", b: "協調性", c: "探究心" },
            { q: "怒った時はどうなる？", a: "はっきり口に出す", b: "黙って距離を置く", c: "理詰めで説明する" },
            { q: "理想のリーダーは？", a: "力強く引っ張る", b: "意見をまとめる", c: "背中で語る職人肌" },
            { q: "今の生活に満足？", a: "刺激が欲しい", b: "穏やかに続いてほしい", c: "新しい変革を起こしたい" },
            { q: "「主役」になりたい？", a: "主役がいい", b: "脇役で支えたい", c: "自由な観客でいたい" }
        ];

        const results = [
            { id: 0, t: "王道の「しお」", d: "素材を引き出す天才。あなたがいなければ物事が成立しない不可欠な存在です。", p: {A:8, B:2, C:0}, good: 7, bad: 2 },
            { id: 1, t: "包容力の「お砂糖」", d: "周囲を癒やすムードメーカー。トゲトゲした空気もあなたがいれば丸く収まります。", p: {A:2, B:8, C:0}, good: 3, bad: 6 },
            { id: 2, t: "刺激的な「唐辛子」", d: "退屈に火をつける情熱家。あなたの言葉は時に誰かの目を覚まさせます。", p: {A:10, B:0, C:0}, good: 4, bad: 0 },
            { id: 3, t: "深みのある「お味噌」", d: "一緒にいると安心する存在。時間をかけて信頼を築く温かい人情派です。", p: {A:0, B:10, C:0}, good: 1, bad: 5 },
            { id: 4, t: "ギャップの「マヨネーズ」", d: "驚異の適応力。マイルドに見えて、実は誰にも譲れない強い芯を持っています。", p: {A:5, B:5, C:0}, good: 2, bad: 9 },
            { id: 5, t: "洗練された「バルサミコ酢」", d: "センスが光る知性派。酸いも甘いも噛み分けた、大人の余裕があります。", p: {A:0, B:3, C:7}, good: 9, bad: 3 },
            { id: 6, t: "魅惑の「スパイス」", d: "一筋縄ではいかないミステリアスな人。独特な魅力で周囲を虜にします。", p: {A:3, B:0, C:7}, good: 8, bad: 1 },
            { id: 7, t: "黄金の「ごま油」", d: "いるだけで場が華やぐ香りの魔術師。全体の質をワンランクアップさせます。", p: {A:6, B:4, C:0}, good: 0, bad: 8 },
            { id: 8, t: "万能の「めんつゆ」", d: "何でも器用にこなすマルチタレント。効率よく完璧に物事を進める賢者です。", p: {A:4, B:6, C:0}, good: 6, bad: 7 },
            { id: 9, t: "孤高の「トリュフ塩」", d: "希少な感性の持ち主。特別な場面でこそ輝くカリスマ性を秘めています。", p: {A:0, B:0, C:10}, good: 5, bad: 4 }
        ];

        let step = 0;
        let score = { A: 0, B: 0, C: 0 };

        function start() {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            render();
        }

        function render() {
            if (step < questions.length) {
                const q = questions[step];
                document.getElementById('q-num').textContent = `Q ${step + 1} / ${questions.length}`;
                document.getElementById('q-text').textContent = q.q;
                document.getElementById('optA').textContent = `A. ${q.a}`;
                document.getElementById('optB').textContent = `B. ${q.b}`;
                document.getElementById('optC').textContent = `C. ${q.c}`;
                document.getElementById('progress-bar').style.width = `${(step / questions.length) * 100}%`;
            } else {
                showResult();
            }
        }

        function next(ans) {
            score[ans]++;
            step++;
            render();
        }

        function showResult() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '100%';

            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');

                let best = results[0];
                let max = -1;
                results.forEach(r => {
                    let val = (score.A * r.p.A) + (score.B * r.p.B) + (score.C * r.p.C);
                    if (val > max) { max = val; best = r; }
                });

                document.getElementById('res-title').textContent = best.t;
                document.getElementById('res-desc').textContent = best.d;
                drawRadarChart(score);

                const goodType = results[best.good].t;
                const badType = results[best.bad].t;
                document.getElementById('comp-good-type').textContent = goodType;
                document.getElementById('comp-bad-type').textContent = badType;

                const shareText = `【調味料診断】私のタイプは「${best.t}」！\n🤝相性良：${goodType}\n💔相性悪：${badType}\n#調味料診断`;
                const shareUrl = window.location.href;

                document.getElementById('btn-x').onclick = () => {
                    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`, '_blank');
                };
                document.getElementById('btn-line').onclick = () => {
                    location.href = `line://msg/text/${encodeURIComponent(shareText + "\n" + shareUrl)}`;
                };
                document.getElementById('btn-copy').onclick = function() {
                    navigator.clipboard.writeText(shareText + "\n" + shareUrl).then(() => {
                        this.textContent = "コピー完了！";
                        setTimeout(() => { this.textContent = "結果をコピー"; }, 2000);
                    });
                };
            }, 1500);
        }

        function drawRadarChart(finalScore) {
            const canvas = document.getElementById('chartCanvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('chart-container');
            const dpr = window.devicePixelRatio || 1;
            const size = container.clientWidth;
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            ctx.scale(dpr, dpr);

            const cx = size / 2;
            const cy = size / 2;
            const radius = size * 0.32;
            const numParams = 5;
            const params = [
                { label: "情熱", value: Math.min(finalScore.A * 12, 100) },
                { label: "安定", value: Math.min(finalScore.B * 10, 100) },
                { label: "個性", value: Math.min(finalScore.C * 15, 100) },
                { label: "癒やし", value: Math.min((finalScore.B * 8 + finalScore.A * 2), 100) },
                { label: "知性", value: Math.min((finalScore.C * 10 + finalScore.B * 4), 100) }
            ];

            // 背景グリッド（薄く）
            ctx.strokeStyle = "#f0f0f0";
            ctx.lineWidth = 1;
            for (let i = 1; i <= 5; i++) {
                const r = radius * (i / 5);
                ctx.beginPath();
                for (let j = 0; j < numParams; j++) {
                    const angle = (Math.PI * 2 / numParams) * j - (Math.PI / 2);
                    const x = cx + Math.cos(angle) * r;
                    const y = cy + Math.sin(angle) * r;
                    if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }

            // スコア線（濃く）
            ctx.beginPath();
            params.forEach((param, j) => {
                const angle = (Math.PI * 2 / numParams) * j - (Math.PI / 2);
                const r = radius * (Math.max(param.value, 10) / 100);
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fillStyle = "rgba(192, 57, 43, 0.4)"; // 塗りを濃く
            ctx.fill();
            ctx.strokeStyle = "rgba(192, 57, 43, 1)"; // 線をはっきりと
            ctx.lineWidth = 3;
            ctx.stroke();

            // ラベル
            ctx.fillStyle = "var(--text-main)";
            ctx.font = "bold 11px sans-serif";
            ctx.textAlign = "center";
            params.forEach((param, j) => {
                const angle = (Math.PI * 2 / numParams) * j - (Math.PI / 2);
                const x = cx + Math.cos(angle) * (radius + 18);
                const y = cy + Math.sin(angle) * (radius + 18) + 4;
                ctx.fillText(param.label, x, y);
            });
        }
    </script>
</body>
</html>
