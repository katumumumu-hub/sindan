<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>【精密診断】隠された「ラスボス度」測定</title>
    <style>
        :root {
            --primary-bg: #0a0a0c;
            --card-bg: rgba(20, 20, 25, 0.95);
            --accent-gold: #d4af37;
            --accent-red: #8e0000;
            --text-main: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Hiragino Mincho ProN', serif; }
        body { background-color: var(--primary-bg); color: var(--text-main); overflow: hidden; }

        #app-container {
            width: 100vw; height: 100dvh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            position: relative;
        }

        #content {
            position: relative; z-index: 10; width: 92%; max-width: 500px;
            background: var(--card-bg); padding: 30px; border-radius: 8px;
            border: 1px solid var(--accent-red); box-shadow: 0 0 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        h1 { font-size: 1.3rem; color: var(--accent-gold); margin-bottom: 20px; letter-spacing: 3px; }
        .question-text { font-size: 1.05rem; margin-bottom: 25px; min-height: 4rem; display: flex; align-items: center; justify-content: center; line-height: 1.5; }
        
        .options-container { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            background: #15151a; border: 1px solid #333; padding: 14px;
            color: #ccc; border-radius: 4px; text-align: left; transition: 0.2s;
            font-size: 0.9rem; cursor: pointer;
        }
        .option-btn:active { background: var(--accent-red); color: white; border-color: var(--accent-gold); }

        #progress-bar {
            position: absolute; top: 0; left: 0; height: 4px;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-gold));
            width: 0%; transition: width 0.3s;
        }

        .result-title { font-size: 1.5rem; color: var(--accent-gold); margin: 15px 0; font-weight: bold; }
        .result-image { width: 100%; aspect-ratio: 1; border: 2px solid var(--accent-gold); margin-bottom: 15px; image-rendering: pixelated; object-fit: cover; }
        .result-desc { font-size: 0.85rem; text-align: left; padding: 15px; background: #000; border-left: 3px solid var(--accent-red); margin-bottom: 20px; }

        .btn-action {
            background: linear-gradient(135deg, #400, #800); color: var(--accent-gold);
            padding: 15px 30px; border: 1px solid var(--accent-gold); border-radius: 4px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        .hidden { display: none !important; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="progress-bar"></div>
        <div id="content">
            <div id="splash">
                <h1>真の「ラスボス」診断</h1>
                <p style="font-size:0.85rem; color:#888; margin-bottom:20px;">全20問の深層心理テスト。<br>あなたの魂に刻まれた「悪の格」を暴きます。</p>
                <button class="btn-action" onclick="start()">深淵へ進む</button>
            </div>
            <div id="question-screen" class="hidden">
                <p id="q-num" style="font-size:0.7rem; color:var(--accent-gold); margin-bottom:10px;"></p>
                <p class="question-text" id="q-text"></p>
                <div class="options-container">
                    <button class="option-btn" onclick="next('A')">A. <span id="optA"></span></button>
                    <button class="option-btn" onclick="next('B')">B. <span id="optB"></span></button>
                    <button class="option-btn" onclick="next('C')">C. <span id="optC"></span></button>
                </div>
            </div>
            <div id="loading" class="hidden">
                <p style="animation: pulse 1.5s infinite;">因果律を再構成中...</p>
            </div>
            <div id="result-screen" class="hidden">
                <p class="result-title" id="res-title"></p>
                <img src="" id="res-img" class="result-image">
                <div class="result-desc" id="res-desc"></div>
                <button class="btn-action" onclick="location.reload()">再起する</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "物語の始まり。勇者が旅立つ村をどうする？", a: "絶望を与えるため焼き払う", b: "泳がせて成長を待つ", c: "村ごと結界に閉じ込め隔離する" },
            { q: "あなたの城の入り口に置くなら？", a: "生者の悲鳴が聞こえる門", b: "何も見えない底なしの闇", c: "美しく冷酷な彫像" },
            { q: "側近に求める最も重要な資質は？", a: "絶対的な恐怖による服従", b: "自分をも欺く知略", c: "共有された狂気" },
            { q: "退屈な時、あなたは何を眺める？", a: "苦悶する人々の姿", b: "崩壊していく星々の軌跡", c: "チェス盤の上の駒のような世界" },
            { q: "勇者が最強の武器を手に入れた。あなたの反応は？", a: "「それがどうした」と鼻で笑う", b: "それを奪うための罠を仕掛ける", c: "その武器の製作者を先に消す" },
            { q: "世界の半分を勇者に与えるという提案は？", a: "嘘。油断させて殺すため", b: "真実。支配が面倒になったから", c: "ありえない。全ては私のものだ" },
            { q: "自分より強い存在が現れたら？", a: "プライドを捨てて力を吸収する", b: "その存在ごと世界を消す", c: "歓喜して戦いに挑む" },
            { q: "あなたの好む食事は？", a: "敗者の魂と絶望", b: "最高級のワインと静寂", c: "食事などという概念は捨てた" },
            { q: "居城のデザインは？", a: "天を突く禍々しい塔", b: "地下深くの忘れられた神殿", c: "幾何学的で無機質な異空間" },
            { q: "勇者の仲間に一人、裏切り者が。どう扱う？", a: "用が済んだら始末する", b: "新しい側近として歓迎する", c: "その裏切りを勇者に暴露して絶望させる" },
            { q: "「正義」という言葉をどう定義する？", a: "弱者がすがる幻想", b: "勝者が書き換える歴史", c: "壊しがいのある虚飾" },
            { q: "封印から目覚めた直後、最初の一言は？", a: "「暗い眠りだった…」", b: "「まずは誰から死にたい？」", c: "「時計の針を進めようか」" },
            { q: "部下があなたの命を狙っていると知ったら？", a: "わざと隙を見せて返り討ちにする", b: "静かに処刑する", c: "面白い。そのまま飼っておく" },
            { q: "あなたがもっとも嫌悪するものは？", a: "「愛」や「希望」といった不確定要素", b: "自分に盾突く無能な群衆", c: "変化のない停滞した時間" },
            { q: "最終決戦。BGMに流れるのは？", a: "重厚なパイプオルガン", b: "耳を劈く絶叫のコーラス", c: "不気味なほどの無音" },
            { q: "勇者があなたの「弱点」を突いてきた！", a: "「まさか…そんなはずは！」と動揺する", b: "それすらも想定内だと別の姿になる", c: "笑いながら弱点ごと破壊する" },
            { q: "歴史にどう記されたい？", a: "世界を終わらせた災厄", b: "新世界を創った神", c: "名前を呼ぶことすら禁じられたタブー" },
            { q: "あなたにとっての「死」とは？", a: "ただの長い休息", b: "負け犬にふさわしい末路", c: "新たな進化へのプロセス" },
            { q: "宝箱に罠を仕掛けるなら？", a: "開けた瞬間に爆発する", b: "中身は空。ただ虚無だけを詰める", c: "最も大切な記憶を吸い出す" },
            { q: "最後に、あなたはこの世界を愛している？", a: "愛しているからこそ作り変えたい", b: "壊すための愛着はある", c: "愛などという言葉は忘れた" }
        ];

        const results = [
            { t: "【堕天の神】ルシフェル", d: "ラスボス度100%。気高く冷酷。世界を一度壊し、自らの法で再構築しようとする創世の野心家。", p: {A:8, B:2, C:0} },
            { t: "【深淵の王】アビス", d: "ラスボス度95%。何も望まず、ただ全てを無に帰すブラックホールのような存在。対話は不可能です。", p: {A:0, B:2, C:8} },
            { t: "【叡智の蛇】メフィスト", d: "ラスボス度90%。知略で世界を転がす黒幕。勇者の旅路すらあなたの筋書き通りです。", p: {A:2, B:8, C:0} },
            { t: "【吸血真祖】ノスフェラトゥ", d: "ラスボス度85%。永遠の時間を生きる高貴なる怪物。圧倒的な力とカリスマで夜を統べる者。", p: {A:5, B:5, C:0} },
            { t: "【機械仕掛けの神】デウス", d: "ラスボス度80%。感情を排し、効率と計算で世界を管理する無機質な支配者。慈悲はありません。", p: {A:0, B:5, C:5} },
            { t: "【狂宴の道化】ジャック", d: "ラスボス度75%。世界の崩壊をエンターテインメントとして楽しむ狂気のエンターテイナー。", p: {A:6, B:0, C:4} },
            { t: "【古の厄災】ドラゴン", d: "ラスボス度70%。圧倒的な物理的暴力。存在そのものが自然災害であり、抗う術はありません。", p: {A:7, B:0, C:3} },
            { t: "【呪われし英雄】ジーク", d: "ラスボス度60%。かつては世界を救ったが、絶望の果てに闇に落ちた哀しき最強の戦士。", p: {A:3, B:7, C:0} },
            { t: "【影の執政官】", d: "ラスボス度50%。表舞台には出ず、経済や政治を操り世界を私物化する現実的な支配者。", p: {A:0, B:10, C:0} },
            { t: "【幽霊城の主】", d: "ラスボス度40%。特定領域のみを支配する小規模なボス。しかしその執念は誰よりも深い。", p: {A:4, B:3, C:3} }
        ];

        let step = 0;
        let score = { A: 0, B: 0, C: 0 };

        function start() {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            render();
        }

        function render() {
            if (step < questions.length) {
                const q = questions[step];
                document.getElementById('q-num').textContent = `PHASE ${step + 1} / ${questions.length}`;
                document.getElementById('q-text').textContent = q.q;
                document.getElementById('optA').textContent = q.a;
                document.getElementById('optB').textContent = q.b;
                document.getElementById('optC').textContent = q.c;
                document.getElementById('progress-bar').style.width = `${(step / questions.length) * 100}%`;
            } else {
                showResult();
            }
        }

        function next(ans) {
            score[ans]++;
            step++;
            render();
        }

        function showResult() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '100%';

            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');

                let best = results[0];
                let max = -1;

                results.forEach(r => {
                    let val = (score.A * r.p.A) + (score.B * r.p.B) + (score.C * r.p.C);
                    if (val > max) { max = val; best = r; }
                });

                document.getElementById('res-title').textContent = best.t;
                document.getElementById('res-desc').textContent = best.d;
                document.getElementById('res-img').src = `boss_${best.t}.png`; // 仮のファイル名
            }, 2000);
        }
    </script>
</body>
</html>
