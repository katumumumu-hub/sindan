<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="恋愛タイプ診断">
    <link rel="apple-touch-icon" href="https://i.ibb.co/k5vH0fH/image-9.png">

    <title>【深層心理】あなたの恋愛タイプ診断</title>
    <style>
        /* --- CSS: アプリっぽいUIとフォトリアルな背景 --- */
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --accent-color: #feca57;
            --text-color: #333;
            --bg-overlay: rgba(255, 255, 255, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            -webkit-tap-highlight-color: transparent; /* タップ時の青い枠を消す */
        }

        body {
            background-color: #fff8f0;
            color: var(--text-color);
            line-height: 1.6;
            overflow: hidden;
            width: 100%;
        }

        /* 全画面背景用のコンテナ - dvhでiPhoneのバーに対応 */
        #app-container {
            width: 100vw;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out;
            position: relative;
        }

        #app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-overlay);
            z-index: 1;
        }

        #content {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background-color: #fff;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            width: 100%;
        }

        .option-btn:active {
            border-color: var(--primary-color);
            background-color: #fff0f0;
            transform: scale(0.98);
        }

        #progress-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background-color: rgba(0,0,0,0.1);
            z-index: 3;
        }

        #progress-bar {
            height: 100%;
            background-color: var(--secondary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .result-title {
            font-size: 1.6rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            font-weight: bold;
        }

        .result-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .result-desc {
            font-size: 0.95rem;
            text-align: left;
            margin-bottom: 25px;
            background: #fdfdfd;
            padding: 15px;
            border-radius: 10px;
        }

        .restart-btn {
            background-color: var(--primary-color);
            color: white; /* 修正済み */
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
        }

        .hidden { display: none !important; }

        @keyframes spin { 100% { transform:rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="content">
            <div id="splash-screen">
                <h1>【深層心理】<br>あなたの恋愛タイプ診断</h1>
                <p style="margin-bottom: 30px;">20個の日常的な選択から、<br>あなたの無意識のスタイルを暴きます。</p>
                <button class="restart-btn" onclick="startDiagnosis()">診断を始める</button>
            </div>

            <div id="question-screen" class="hidden">
                <p class="question-text" id="question-text"></p>
                <div class="options-container">
                    <button class="option-btn" onclick="answer('A')">A. <span id="optA-text"></span></button>
                    <button class="option-btn" onclick="answer('B')">B. <span id="optB-text"></span></button>
                    <button class="option-btn" onclick="answer('C')">C. <span id="optC-text"></span></button>
                </div>
            </div>

            <div id="loading-screen" class="hidden">
                <p class="question-text">深層心理を分析中...</p>
                <div style="font-size: 3rem; animation: spin 1s linear infinite;">🧠</div>
            </div>

            <div id="result-screen" class="hidden">
                <p class="result-title" id="result-title"></p>
                <img src="" alt="診断結果" class="result-image" id="result-image">
                <p class="result-desc" id="result-desc"></p>
                <button class="restart-btn" onclick="restart()">もう一度診断する</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "朝起きて、窓の外が土砂降りだったら？", a: "「最悪だ」と声に出して、二度寝を試みる", b: "濡れないための万全な準備を始める", c: "あえてゆっくりコーヒーを淹れる" },
            { q: "行列のあと一組で、スープが切れたら？", a: "店員に心の中で毒づく", b: "すぐに別の店を探す", c: "逆にその状況を面白がる" },
            { q: "カチカチと音がするカバンを拾ったら？", a: "猛ダッシュで離れる", b: "何の音か正体を突き止めようとする", c: "写真を撮る" },
            { q: "パズルの最後の1ピースが足りない！", a: "見つかるまで探し続ける", b: "自分で代わりのピースを作る", c: "欠けたまま飾る" },
            { q: "友人の結婚式でスピーチを頼まれたら？", a: "感動的に伝える", b: "会場を笑わせる", c: "詩的な言葉を贈る" },
            { q: "RPGで最初に選ぶ武器は？", a: "攻撃力特化の「巨大な剣」", b: "仲間を癒せる「魔法の杖」", c: "素早く動ける「隠密の短剣」" },
            { q: "美術館で一番長く立ち止まるのは？", a: "強烈な色の抽象画", b: "緻密で穏やかな風景画", c: "奇妙な彫刻" },
            { q: "知らない番号から電話。どうする？", a: "勢いよく出る", b: "検索して確認してからかけ直す", c: "留守電が入るのを待つ" },
            { q: "お茶を買ったのに、コーラが出てきたら？", a: "管理会社に連絡する", b: "たまにはいいかと飲む", c: "誰か欲しそうな人を探す" },
            { q: "真っ白な部屋にボタンが1つ。", a: "迷わず連打する", b: "考察してから一度だけ押す", c: "様子を見る" },
            { q: "タイムマシンが1回だけ使えます。", a: "成功しているはずの未来", b: "歴史的な過去", c: "今朝の自分に忘れ物注意をしに行く" },
            { q: "野良猫と目が合いました。", a: "「お腹すいてるの？」と話す", b: "じっと見つめ合い、意思疎通を図る", c: "構わずに目的地へ急ぐ" },
            { q: "宝くじで100万円当たりました！", a: "豪華な食事や買い物に使う", b: "半分を貯金、残りを生活費に", c: "一人旅の資金にする" },
            { q: "メニューが多すぎて決められない。", a: "「一番人気は？」と聞く", b: "いつもの安定したものを選ぶ", c: "適当に指を差して決める" },
            { q: "観覧車の頂上で揺れたら？", a: "叫んで隣の人にしがみつく", b: "手すりをぎゅっと握る", c: "風の強さを分析する" },
            { q: "SNSで「いいね」が0だったら？", a: "投稿を消すか修正する", b: "特に気に留めない", c: "誰も見ていない自由さを楽しむ" },
            { q: "自分を色に例えるなら？", a: "鮮やかな「レッド」", b: "透き通るような「ブルー」", c: "深みのある「パープル」" },
            { q: "隣の人の咀嚼音がうるさかったら？", a: "チラッと見てプレッシャーをかける", b: "映画に没頭しようと努力する", c: "自分も音を立てて食べ始める" },
            { q: "鏡の中の自分が別人に身えたら？", a: "「今日、イケてるかも」と喜ぶ", b: "疲れているなと判断して寝る", c: "その鏡像と会話してみる" },
            { q: "診断終了。今の気分は？", a: "「早く結果が見たい！」", b: "「本当に当たるのかな？」", c: "「終わるのが名残惜しい」" }
        ];

        const resultsData = {
            burning: { title: "【全開！バーニング・ラブ型】", desc: "恋愛＝人生のガソリン。直感と情熱で突き進むタイプ。一目惚れしやすく、駆け引きよりもストレートな勝負を好みます。", image: "https://i.ibb.co/3Wqj1s0/image-8.png", overlay: "rgba(255, 245, 240, 0.85)" },
            guardian: { title: "【安心のガーディアン型】", desc: "恋愛＝心の安全基地。信頼を重んじるタイプ。じっくり相手を知ってから好きになります。一度付き合うと非常に長く続きます。", image: "https://i.ibb.co/k5vH0fH/image-9.png", overlay: "rgba(255, 252, 245, 0.85)" },
            nomad: { title: "【孤高のノマド・スタイル型】", desc: "恋愛＝人生のスパイス。自分の世界を一番大切にするタイプ。束縛を嫌い、ミステリアスな魅力で相手を翻弄します。", image: "https://i.ibb.co/jH0N8jX/image-10.png", overlay: "rgba(240, 245, 255, 0.85)" },
            profiler: { title: "【知的なプロファイラー型】", desc: "恋愛＝高度な心理戦。相手を観察し、最適解を探すタイプ。感情に流されず、スマートな大人の恋愛を楽しみます。", image: "https://i.ibb.co/68038mB/image-11.png", overlay: "rgba(245, 255, 252, 0.85)" },
            trickster: { title: "【変幻自在のトリックスター型】", desc: "恋愛＝予測不能な冒険。相手によって自分のキャラが変わるタイプ。掴みどころがなく、常に新しい刺激を求める冒険家です。", image: "https://i.ibb.co/v3X2Fh9/image-12.png", overlay: "rgba(255, 240, 255, 0.85)" }
        };

        let currentStep = 0;
        let answers = { A: 0, B: 0, C: 0 };

        function updateBackground(imageUrl) {
            document.getElementById('app-container').style.backgroundImage = `url('${imageUrl}')`;
        }

        function startDiagnosis() {
            document.getElementById('splash-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            if (currentStep < questions.length) {
                const q = questions[currentStep];
                document.getElementById('question-text').textContent = q.q;
                document.getElementById('optA-text').textContent = q.a;
                document.getElementById('optB-text').textContent = q.b;
                document.getElementById('optC-text').textContent = q.c;
                document.getElementById('progress-bar').style.width = `${(currentStep / questions.length) * 100}%`;
                updateBackground(resultsData.guardian.image);
            } else {
                showLoading();
            }
        }

        function answer(type) {
            answers[type]++;
            currentStep++;
            showQuestion();
        }

        function showLoading() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '100%';
            setTimeout(showResult, 2000);
        }

        function showResult() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            let finalType = 'trickster';
            const { A, B, C } = answers;
            const max = Math.max(A, B, C);

            if (max - Math.min(A, B, C) <= 2) finalType = 'trickster';
            else if (A >= 7 && B >= 7 && C <= 4) finalType = 'profiler';
            else if (A >= B && A >= C) finalType = 'burning';
            else if (B >= A && B >= C) finalType = 'guardian';
            else finalType = 'nomad';

            const data = resultsData[finalType];
            document.getElementById('result-title').textContent = data.title;
            document.getElementById('result-image').src = data.image;
            document.getElementById('result-desc').textContent = data.desc;
            updateBackground(data.image);
            document.getElementById('app-container').style.setProperty('--bg-overlay', data.overlay);
        }

        function restart() {
            currentStep = 0;
            answers = { A: 0, B: 0, C: 0 };
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('splash-screen').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '0%';
            updateBackground(resultsData.guardian.image);
        }
    </script>
</body>
</html>
