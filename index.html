<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診断アプリポータル</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 600px;
            width: 90%;
            margin-top: 30px;
        }

        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .menu-grid {
            display: grid;
            gap: 20px;
        }

        .menu-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 6px solid var(--primary-color);
        }

        .menu-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .menu-text h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .menu-text p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: #888;
        }

        .arrow {
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

<header>
    <h1>マイ診断シリーズ</h1>
</header>

<div class="container">
    <p class="description">気になる診断を選んでタップしてね！</p>
    
    <div class="menu-grid">
        <a href="./renai1/index.html" class="menu-item">
            <div class="menu-text">
                <h2>❤️ 恋愛診断</h2>
                <p>あなたの恋愛傾向をチェック</p>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="./zenshok/index.html" class="menu-item">
            <div class="menu-text">
                <h2>💼 前職診断</h2>
                <p>あなたの本当の適職は？</p>
            </div>
            <div class="arrow">→</div>
        </a>

        <div class="menu-item" style="opacity: 0.5; border-left-color: #ccc;">
            <div class="menu-text">
                <h2>??? 準備中</h2>
                <p>新しい診断を開発中...</p>
            </div>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 診断アプリ Project
</footer>

</body>
</html>
