<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="喜怒哀楽診断">

    <title>【精密】脳内の「喜怒哀楽」比率診断</title>
    <style>
        :root {
            --joy-color: #ffda79;    /* 喜：イエロー */
            --anger-color: #ff5252;  /* 怒：レッド */
            --sorrow-color: #70a1ff; /* 哀：ブルー */
            --pleasure-color: #1dd1a1;/* 楽：グリーン */
            --primary-color: #4834d4;
            --text-color: #2f3542;
            --bg-color: #f1f2f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', 'Arial', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow: hidden;
            width: 100%;
        }

        #app-container {
            width: 100vw;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            position: relative;
        }

        #content {
            position: relative;
            z-index: 2;
            width: 92%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px 15px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            text-align: center;
        }

        .option-btn:active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        #progress-container {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background-color: rgba(0,0,0,0.05);
            z-index: 3;
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--joy-color), var(--anger-color), var(--sorrow-color), var(--pleasure-color));
            width: 0%;
            transition: width 0.3s;
        }

        /* 結果画面 */
        .chart-container {
            margin: 20px 0;
            display: flex;
            height: 35px;
            border-radius: 18px;
            overflow: hidden;
            background: #eee;
        }

        .chart-bar { height: 100%; transition: width 1s ease-out; }
        .bar-joy { background-color: var(--joy-color); }
        .bar-anger { background-color: var(--anger-color); }
        .bar-sorrow { background-color: var(--sorrow-color); }
        .bar-pleasure { background-color: var(--pleasure-color); }

        .legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            padding: 6px;
            border-radius: 8px;
            background: #f8f9fa;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

        .result-desc {
            font-size: 0.9rem;
            text-align: left;
            margin-bottom: 20px;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 12px;
            line-height: 1.6;
        }

        .action-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(72, 52, 212, 0.2);
            cursor: pointer;
        }

        .secondary-btn {
            background-color: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .hidden { display: none !important; }
        @keyframes spin { 100% { transform:rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="content">
            <div id="splash-screen">
                <div style="font-size: 3rem; margin-bottom: 10px;">🧠</div>
                <h1>脳内の「喜怒哀楽」比率診断</h1>
                <p style="margin-bottom: 25px; font-size: 0.85rem; color: #666;">
                    全20問の深層心理テストで、<br>
                    あなたの感情をパーセント表示します。
                </p>
                <button class="action-btn" onclick="startDiagnosis()">診断を開始する</button>
            </div>

            <div id="question-screen" class="hidden">
                <p style="font-size: 0.75rem; color: var(--primary-color); font-weight: bold; margin-bottom: 5px;" id="q-number"></p>
                <p class="question-text" id="question-text"></p>
                <div class="options-container" id="options-area"></div>
            </div>

            <div id="loading-screen" class="hidden">
                <p class="question-text">感情成分を分離中...</p>
                <div style="font-size: 2.5rem; animation: spin 2s linear infinite;">💠</div>
            </div>

            <div id="result-screen" class="hidden">
                <p style="font-size: 0.85rem; font-weight: bold; color: #555;">診断結果：あなたの脳内比率</p>
                <div class="chart-container" id="chart-area">
                    <div id="bar-joy" class="chart-bar bar-joy"></div>
                    <div id="bar-anger" class="chart-bar bar-anger"></div>
                    <div id="bar-sorrow" class="chart-bar bar-sorrow"></div>
                    <div id="bar-pleasure" class="chart-bar bar-pleasure"></div>
                </div>
                <div class="legend">
                    <div class="legend-item"><span class="dot bar-joy"></span> 喜: <span id="label-joy"></span>%</div>
                    <div class="legend-item"><span class="dot bar-anger"></span> 怒: <span id="label-anger"></span>%</div>
                    <div class="legend-item"><span class="dot bar-sorrow"></span> 哀: <span id="label-sorrow"></span>%</div>
                    <div class="legend-item"><span class="dot bar-pleasure"></span> 楽: <span id="label-pleasure"></span>%</div>
                </div>
                <div class="result-desc" id="result-desc"></div>
                
                <button class="action-btn" onclick="restart()">もう一度診断する</button>
                <button class="secondary-btn" onclick="goToTop()">トップメニューに戻る</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "朝起きて一番に考えることは？", a: ["今日も良い日になりそう", "あと5分…と少しイラつく", "現実に戻るのが寂しい", "今日の面白い予定のこと"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "目の前で電車が閉まってしまった！", a: ["次の電車でゆっくり行こう", "運のなさに腹が立つ", "自分の不運に落ち込む", "この待ち時間で何しよう？"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "宝くじで少額当たったら？", a: ["素直に「やったー！」", "これだけ？ともっと欲が出る", "これ以上の幸運はないと怯える", "パッと楽しいことに使う"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "友人から突然の呼び出し、どう思う？", a: ["会えるのが嬉しい", "自分の時間を邪魔された", "何か悪い知らせかも…", "面白そうな予感！"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "道端に咲く花が散っているのを見て…", a: ["実を結ぶのが楽しみ", "掃除が大変そうだと思う", "命の儚さに胸が痛む", "風流で良いなと感じる"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "SNSの反応がいつもより少ない時", a: ["見てくれた人に感謝する", "なんで評価されないんだ！", "自分は嫌われてるのかも", "気にせず次を投稿する"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "一番落ち着く場所はどこ？", a: ["光の差し込むリビング", "物事に集中できる作業部屋", "布団の中で一人静かに", "賑やかでワクワクする場所"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "行列店での待ち時間、あなたの心境は？", a: ["期待感でワクワクする", "並ばせるシステムにイライラ", "足の疲れに気が滅入る", "人間観察を楽しめる"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "他人の成功を耳にした時", a: ["自分のことのように喜ぶ", "負けてられないと燃える", "自分との差に落ち込む", "成功の秘訣を知りたい"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "映画を一本観るならどれ？", a: ["心が温まるヒューマンドラマ", "手に汗握るリベンジもの", "涙が止まらない純愛物語", "奇想天外なコメディ"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "雨の日、窓の外を眺めて何を思う？", a: ["植物が潤ってて綺麗", "洗濯物が乾かなくて嫌だ", "なんだか感傷的になる", "雨音のリズムが心地よい"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "自分のミスを指摘されたら？", a: ["教えてくれてありがとう", "そんな言い方しなくても！", "消えてしまいたいほど凹む", "次はどう改善するか楽しむ"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "古いアルバムを見返している時", a: ["楽しかった思い出に浸る", "当時の不器用な自分にイラつく", "戻れない時間に涙が出る", "ファッションの変化が面白い"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "新しいことに挑戦する前夜は？", a: ["成功を夢見てぐっすり", "不安とプレッシャーでピリピリ", "失敗したらどうしようと憂鬱", "ワクワクして眠れない"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "誰かにサプライズをされたら？", a: ["感激して飛び上がる", "驚きすぎて少しパニック", "申し訳なさで恐縮する", "仕掛けの面白さに感銘を受ける"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "騒がしい子供たちが近くにいたら？", a: ["元気があって微笑ましい", "うるさくて集中できない", "親の苦労を思って沈む", "遊びの独創性に注目する"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "プレゼントを贈るならどんなもの？", a: ["相手が絶対に喜ぶもの", "実用的で質の高いもの", "心に残る思い出の品", "他にはない珍しいもの"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "「運命」という言葉をどう捉える？", a: ["幸せへ導いてくれるもの", "自分の力でねじ伏めるもの", "逆らえない悲しい力", "偶然が重なる面白いゲーム"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "一日の終わりに自分にかける言葉は？", a: ["今日も最高だったね", "もっとやれたはずだ", "疲れた、もう休もう…", "明日は何が起きるかな？"], t: ["joy", "anger", "sorrow", "pleasure"] },
            { q: "あなたの人生を一言で表すと？", a: ["感謝", "挑戦", "流転", "冒険"], t: ["joy", "anger", "sorrow", "pleasure"] }
        ];

        let currentStep = 0;
        let emotions = { joy: 0, anger: 0, sorrow: 0, pleasure: 0 };

        function startDiagnosis() {
            document.getElementById('splash-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            if (currentStep < questions.length) {
                const q = questions[currentStep];
                document.getElementById('q-number').textContent = `第 ${currentStep + 1} 問 / 20`;
                document.getElementById('question-text').textContent = q.q;
                
                const optionsArea = document.getElementById('options-area');
                optionsArea.innerHTML = '';
                q.a.forEach((text, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = text;
                    btn.onclick = () => answer(q.t[i]);
                    optionsArea.appendChild(btn);
                });
                
                document.getElementById('progress-bar').style.width = `${(currentStep / questions.length) * 100}%`;
            } else {
                showLoading();
            }
        }

        function answer(type) {
            emotions[type]++;
            currentStep++;
            showQuestion();
        }

        function showLoading() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '100%';
            setTimeout(showResult, 2500);
        }

        function showResult() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const total = 20;
            const pJoy = Math.round((emotions.joy / total) * 100);
            const pAnger = Math.round((emotions.anger / total) * 100);
            const pSorrow = Math.round((emotions.sorrow / total) * 100);
            const pPleasure = 100 - (pJoy + pAnger + pSorrow);

            document.getElementById('bar-joy').style.width = pJoy + '%';
            document.getElementById('bar-anger').style.width = pAnger + '%';
            document.getElementById('bar-sorrow').style.width = pSorrow + '%';
            document.getElementById('bar-pleasure').style.width = pPleasure + '%';

            document.getElementById('label-joy').textContent = pJoy;
            document.getElementById('label-anger').textContent = pAnger;
            document.getElementById('label-sorrow').textContent = pSorrow;
            document.getElementById('label-pleasure').textContent = pPleasure;

            let desc = "";
            const maxVal = Math.max(pJoy, pAnger, pSorrow, pPleasure);
            if (pJoy === maxVal) desc = "あなたの脳内は「喜び」に満ち溢れています。些細なことにも感謝を見つけ、自分も周囲も幸せにする天才的なポジティブさを持っています。";
            else if (pAnger === maxVal) desc = "あなたの脳内には熱い「怒り」のエネルギーが燃えています。それは不義を許さない正義感や、現状をより良くしたいという強い情熱の証。変革を起こす力を持っています。";
            else if (pSorrow === maxVal) desc = "あなたの脳内は深い「哀しみ」の情緒を大切にしています。感受性が豊かで、人の弱さや儚さに寄り添える、とても優しく深い心の持ち主です。";
            else desc = "あなたの脳内は「楽しさ」を羅針盤にしています。退屈を嫌い、常に新しい刺激や面白さを追求する、人生という名の冒険を楽しむ自由人です。";

            document.getElementById('result-desc').textContent = desc;
        }

        function restart() {
            currentStep = 0;
            emotions = { joy: 0, anger: 0, sorrow: 0, pleasure: 0 };
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('splash-screen').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '0%';
        }

        function goToTop() {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
